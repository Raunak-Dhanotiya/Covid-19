name: S3 Bucket Testing

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Spring Boot
        run: mvn clean package -DskipTests

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS CLI
        run: |
          python3 -m pip install --upgrade --user awscli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Validate S3 bucket secret
        run: |
          if [ -z "${{ secrets.S3_BUCKET_NAME }}" ]; then
            echo "ERROR: S3_BUCKET_NAME secret is not set. Please configure it in GitHub Secrets."
            exit 1
          fi
          if [ -z "${{ secrets.AWS_REGION }}" ]; then
            echo "ERROR: AWS_REGION secret is not set. Please configure it in GitHub Secrets."
            exit 1
          fi

      - name: Verify S3 bucket
        run: |
          bucket="${{ secrets.S3_BUCKET_NAME }}"
          bucket=${bucket#s3://}
          bucket=${bucket%/}
          aws s3api head-bucket --bucket "$bucket"

      - name: Upload Spring Boot jar to S3
        run: |
          bucket="${{ secrets.S3_BUCKET_NAME }}"
          bucket=${bucket#s3://}
          bucket=${bucket%/}
          jar=$(ls target/*.jar | head -n 1)
          echo "Uploading $jar to s3://$bucket/$(basename "$jar")"
          aws s3 cp "$jar" "s3://$bucket/$(basename "$jar")"
