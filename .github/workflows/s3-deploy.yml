name: S3 Bucket Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and deploy'
        required: true
        default: main
        type: choice
        options:
          - main
          - develop
          - staging
          - release

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      MAVEN_OPTS: -Xmx1024m

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Validate required GitHub secrets
        run: |
          set -euo pipefail
          echo "Validating required secrets..."
          for secret_name in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_REGION S3_BUCKET_NAME; do
            value="${!secret_name:-}"
            if [ -z "$value" ]; then
              echo "ERROR: $secret_name is not set. Please configure it in GitHub Secrets."
              exit 1
            fi
          done
          echo "✓ All required secrets are configured."

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Debug Secrets
        run: |
          echo "Bucket Name: ${{ secrets.S3_BUCKET_NAME }}"
          echo "Region: ${{ secrets.AWS_REGION }}"

      - name: Upload JAR To S3
        run: aws s3 cp target/*.jar s3://${{ secrets.S3_BUCKET_NAME }}/
