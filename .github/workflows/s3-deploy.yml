name: S3 Bucket Testing

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Spring Boot
        run: mvn clean package -DskipTests

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS CLI
        run: |
          python3 -m pip install --upgrade --user awscli
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Validate S3 bucket secret
        run: |
          if [ -z "${{ secrets.S3_BUCKET_NAME }}" ]; then
            echo "ERROR: S3_BUCKET_NAME secret is not set. Please configure it in GitHub Secrets."
            exit 1
          fi
          if [ -z "${{ secrets.AWS_REGION }}" ]; then
            echo "ERROR: AWS_REGION secret is not set. Please configure it in GitHub Secrets."
            exit 1
          fi

      - name: Debug AWS Configuration
        run: |
          echo "AWS Region: ${{ secrets.AWS_REGION }}"
          echo "S3 Bucket: ${{ secrets.S3_BUCKET_NAME }}"
          aws sts get-caller-identity

      - name: List all S3 buckets
        run: |
          echo "Available S3 buckets:"
          aws s3 ls

      - name: Verify S3 bucket exists
        run: |
          bucket="${{ secrets.S3_BUCKET_NAME }}"
          bucket=${bucket#s3://}
          bucket=${bucket%/}
          echo "Checking bucket: $bucket"
          if aws s3api head-bucket --bucket "$bucket" 2>/dev/null; then
            echo "✓ Bucket $bucket exists and is accessible"
          else
            echo "✗ Bucket $bucket does NOT exist or is not accessible"
            exit 1
          fi

      - name: Upload Spring Boot jar to S3
        run: |
          bucket="${{ secrets.S3_BUCKET_NAME }}"
          bucket=${bucket#s3://}
          bucket=${bucket%/}
          jar=$(ls target/*.jar | head -n 1)
          echo "✓ Found JAR: $jar"
          echo "Uploading to: s3://$bucket/$(basename "$jar")"
          aws s3 cp "$jar" "s3://$bucket/$(basename "$jar")" --region "${{ secrets.AWS_REGION }}"
          echo "✓ Upload successful"
