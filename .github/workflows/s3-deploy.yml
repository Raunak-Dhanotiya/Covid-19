name: S3 Bucket Testing

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Spring Boot
        run: mvn clean package -DskipTests

      - name: Configure AWS with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Debug AWS Configuration
        run: |
          echo "AWS Region: ${{ env.AWS_REGION }}"
          echo "S3 Bucket: ${{ secrets.S3_BUCKET_NAME }}"
          aws sts get-caller-identity

      - name: List all S3 buckets
        run: |
          echo "Available S3 buckets:"
          aws s3 ls

      - name: Verify S3 bucket exists
        run: |
          bucket="${{ secrets.S3_BUCKET_NAME }}"
          bucket=${bucket#s3://}
          bucket=${bucket%/}
          echo "Checking bucket: $bucket"
          if aws s3api head-bucket --bucket "$bucket" 2>/dev/null; then
            echo "✓ Bucket $bucket exists and is accessible"
          else
            echo "✗ Bucket $bucket does NOT exist or is not accessible"
            exit 1
          fi

      - name: Upload Spring Boot jar to S3
        run: |
          bucket="${{ secrets.S3_BUCKET_NAME }}"
          bucket=${bucket#s3://}
          bucket=${bucket%/}
          jar=$(ls target/*.jar | head -n 1)
          echo "✓ Found JAR: $jar"
          echo "Uploading to: s3://$bucket/$(basename "$jar")"
          aws s3 cp "$jar" "s3://$bucket/$(basename "$jar")" --region "${{ env.AWS_REGION }}"
          echo "✓ Upload successful"
