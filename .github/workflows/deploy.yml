# =============================================================================
# 🚀 Production Deployment Pipeline
# =============================================================================
name: Deploy to Production

on:
  workflow_run:
    workflows: ["Backend CI/CD", "Frontend CI/CD"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options: [production, staging]
      deploy_target:
        description: "What to deploy"
        required: true
        default: "all"
        type: choice
        options: [all, frontend, backend]

env:
  APP_DIR: /opt/covid-19-tracker

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  pre-deploy:
    name: 🔍 Pre-Deploy Checks
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      deploy_frontend: ${{ steps.targets.outputs.frontend }}
      deploy_backend: ${{ steps.targets.outputs.backend }}
    steps:
      - name: 🎯 Determine targets
        id: targets
        run: |
          TARGET="${{ github.event.inputs.deploy_target || 'all' }}"
          echo "frontend=$( [ "$TARGET" = 'all' ] || [ "$TARGET" = 'frontend' ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "backend=$( [ "$TARGET" = 'all' ] || [ "$TARGET" = 'backend' ] && echo true || echo false )" >> $GITHUB_OUTPUT

  deploy-backend:
    name: 🖥️ Deploy Backend
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: needs.pre-deploy.outputs.deploy_backend == 'true'
    environment:
      name: production
      url: http://${{ secrets.VPS_HOST }}:8080
    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "🚀 Backend Deployment — $(date -u)"
            cd ${{ env.APP_DIR }}
            git pull origin main
            docker compose pull backend || true
            docker compose up -d --build --force-recreate backend
            echo "⏳ Waiting for health check..."
            for i in $(seq 1 30); do
              if docker compose exec backend curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ Backend is healthy!"; break
              fi
              [ $i -eq 30 ] && echo "❌ Health check failed" && docker compose logs --tail=50 backend && exit 1
              sleep 5
            done
            docker image prune -f
            echo "✅ Backend deployed!"

  deploy-frontend:
    name: 🌐 Deploy Frontend
    runs-on: ubuntu-latest
    needs: pre-deploy
    if: needs.pre-deploy.outputs.deploy_frontend == 'true'
    environment:
      name: production
      url: http://${{ secrets.VPS_HOST }}:3000
    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "🚀 Frontend Deployment — $(date -u)"
            cd ${{ env.APP_DIR }}
            git pull origin main
            docker compose up -d --build --force-recreate frontend
            sleep 5
            curl -sf http://localhost:3000 > /dev/null && echo "✅ Frontend live!" || echo "⚠️ Starting..."
            docker image prune -f

  post-deploy:
    name: ✅ Post-Deploy
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: 📝 Report
        run: |
          echo "### 📊 Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.deploy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
