# =============================================================================
# 🚀 Backend CI Pipeline — Spring Boot
# =============================================================================
# Triggers on pushes and pull requests to the main branch.
# Jobs: build → test
# =============================================================================

name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: 🏗️ Build & 🧪 Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: covid19_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: 🔧 Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: 🏗️ Build and Test with Maven
        run: ./mvnw clean package -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/covid19_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: testpassword
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          JWT_SECRET: ci-test-secret-key-that-is-at-least-256-bits-long-for-hmac

      - name: 📊 Job Summary
        if: always()
        run: |
          echo "### 🏗️ Build & 🧪 Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # JAR Information
          JAR_FILE=$(find target -name "*.jar" -not -name "*-sources.jar" | head -1)
          if [ -n "$JAR_FILE" ]; then
            JAR_SIZE=$(du -h "$JAR_FILE" | cut -f1)
            echo "#### 📦 Artifact" >> $GITHUB_STEP_SUMMARY
            echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **JAR** | \`$(basename $JAR_FILE)\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Size** | $JAR_SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Test Results
          if [ -d "target/surefire-reports" ]; then
            TOTAL=$(find target/surefire-reports -name "*.txt" | wc -l)
            FAILED=$(grep -l "FAILURE\|ERROR" target/surefire-reports/*.txt 2>/dev/null | wc -l)
            PASSED=$((TOTAL - FAILED))
            echo "#### 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| 📊 Total  | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          fi
