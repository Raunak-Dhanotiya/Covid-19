# =============================================================================
# 🚀 Backend CI Pipeline — Spring Boot
# =============================================================================
# Triggers on pushes and pull requests to the main branch.
# Jobs: build → test
# =============================================================================

name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  JAVA_DISTRIBUTION: "temurin"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job 1: Build — Compile the Spring Boot application
  # ===========================================================================
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: 🔧 Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: 🏗️ Build with Maven (skip tests)
        run: ./mvnw clean package -DskipTests -B

      - name: 📊 Build summary
        run: |
          JAR_FILE=$(find target -name "*.jar" -not -name "*-sources.jar" | head -1)
          JAR_SIZE=$(du -h "$JAR_FILE" | cut -f1)
          echo "### 🏗️ Backend Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **JAR File** | \`$(basename $JAR_FILE)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $JAR_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Java** | ${{ env.JAVA_VERSION }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 2: Test — Run unit and integration tests
  # ===========================================================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: covid19_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: 📦 Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: 🔧 Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: 🧪 Run tests
        run: ./mvnw test -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/covid19_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: testpassword
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          JWT_SECRET: ci-test-secret-key-that-is-at-least-256-bits-long-for-hmac

      - name: 📊 Test results summary
        if: always()
        run: |
          echo "### 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "target/surefire-reports" ]; then
            TOTAL=$(find target/surefire-reports -name "*.txt" | wc -l)
            FAILED=$(grep -l "FAILURE\|ERROR" target/surefire-reports/*.txt 2>/dev/null | wc -l)
            PASSED=$((TOTAL - FAILED))
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| 📊 Total  | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No test reports found." >> $GITHUB_STEP_SUMMARY
          fi
