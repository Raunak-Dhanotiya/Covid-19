# =============================================================================
# 🚀 Frontend CI Pipeline — React (Vite)
# =============================================================================
# Triggers on pushes and pull requests to the main branch.
# Jobs: lint → build
# =============================================================================

name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  WORKING_DIR: ./frontend

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: 🔍 Lint & 🏗️ Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: 📊 Report build size
        run: |
          echo "### 📦 Build Output Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find dist -type f \( -name "*.js" -o -name "*.css" \) | while read file; do
            size=$(du -h "$file" | cut -f1)
            echo "| \`$(basename $file)\` | $size |" >> $GITHUB_STEP_SUMMARY
          done
