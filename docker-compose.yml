# =============================================================================
# 🐳 Docker Compose — COVID-19 Tracker (Production-Ready)
# =============================================================================
# Usage:
#   docker compose up -d        # Start all services
#   docker compose logs -f      # Follow logs
#   docker compose down         # Stop all services
# =============================================================================

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:18.3-alpine
    container_name: covid19-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-covid19}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-covid19}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Spring Boot Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/covid-19-tracker-backend:latest
    container_name: covid19-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/covid19}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-root}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-mysecretkeymysecretkeymysecretkey123456}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-36000000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health > /dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── React Frontend (Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: covid19-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:80" ]
      interval: 30s
      timeout: 5s
      retries: 3

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
